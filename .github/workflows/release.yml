name: release

# Cuts a GitHub Release with prebuilt binaries on tag push (v*).
#
# Tag conventions:
#   v0.1.0  → release v0.1.0
# Pre-releases (v0.1.0-rc.1, v0.1.0-beta) are accepted by the same tag pattern.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mdtype
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mdtype
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mdtype
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mdtype
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mdtype.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux-aarch64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin mdtype --target ${{ matrix.target }}
          else
            cargo build --release --bin mdtype --target ${{ matrix.target }}
          fi

      - name: Package
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          dist="mdtype-${version}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$dist/"
          cp README.md LICENSE-MIT CHANGELOG.md "$dist/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "$dist.zip" "$dist"
            asset="$dist.zip"
          else
            tar -czf "$dist.tar.gz" "$dist"
            asset="$dist.tar.gz"
          fi
          # SHA-256 sidecar for integrity-checking installers (curl ... | sh).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "sha256=$asset.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.sha256 }}
          generate_release_notes: true
          fail_on_unmatched_files: true
